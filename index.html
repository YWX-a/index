






<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html>
<meta name="viewport" content="width=device-width,minimum-scale=1.0, maximum-scale=2.0" />
<head>
	<title>查询结果</title>
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<style type="text/css"> 
body,td,th {font-family:宋体;font-size:12px;color:#333333;}
body {margin:0px;}
.sl12c {font-family:"宋体";font-size:13px;font-weight:bold;color:#046aaf;line-height:24px;}
.black12 {font-family:"宋体";font-size:13px;font-weight:normal;color:#000000;line-height:20px;}
.xx {border-bottom:1px dashed #CCCCCC;}
</style>
</HEAD> 
<BODY topmargin="0">
<div id="box"></div>
<!-- 直接引用CDN的xlsx库，无需本地文件 -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
let nameList = [
    "名称","统一社会信用代码","宗旨和业务范围","住所","法定代表人",
    "经费来源","开办资金","举办单位","有效期","单位状态"
];
let num = window.location.search.replace('?s=','');
fetch("data.xlsx")
.then(res => res.arrayBuffer())
.then(data => {
    let wb = XLSX.read(data);
    let sheet = wb.Sheets[wb.SheetNames[0]];
    let list = XLSX.utils.sheet_to_json(sheet);
    let cleanList = list.map(item => {
        let newItem = {};
        for(let key in item) newItem[key.trim()] = item[key];
        return newItem;
    });
    let row = cleanList.find(item => String(item.s) === String(num)) || {};
    let html = "";
    for(let i=0;i<nameList.length;i++){
        html += `<table width="92%" border="0" cellspacing="0" cellpadding="0"><tr><td width="115" align="right" class="sl12c">${nameList[i]}</td><td width="15">&nbsp;</td><td align="left" class="black12">${row[nameList[i]]||''}</td></tr></table>`;
        if(i<=7) html += `<table width="92%"><tr><td class="xx"></td></tr></table>`;
    }
    document.getElementById("box").innerHTML = html;
})
</script>
</BODY>
</html>
