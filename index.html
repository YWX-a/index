<script>
// =========只需在此修改左侧名称，Excel表头同步即可=========
let titleArr = [
    "名称",
    "统一社会信用代码",
    "宗旨和业务范围",
    "住所",
    "法定代表人",
    "经费来源",
    "开办资金",
    "举办单位",
    "有效期",
    "单位状态"
];
// =======================================================

// 获取网址参数 ?s=
let sid = window.location.search.replace("?s=","");

// 读取Excel
fetch("data.xlsx")
.then(res=>res.arrayBuffer())
.then(buf=>{
    let wb = XLSX.read(buf);
    let sheet = wb.Sheets[0];
    let json = XLSX.utils.sheet_to_json(sheet);

    // 清除表头空格
    let newData = json.map(item=>{
        let obj = {};
        for(let k in item){
            obj[k.trim()] = item[k];
        }
        return obj;
    });

    // 匹配对应数据
    let info = newData.find(v=> String(v.s) === String(sid)) || {};

    // 拼接原版格式HTML
    let html = '<table width="92%" border="0" cellspacing="0" cellpadding="0">';
    
    for(let i=0;i<titleArr.length;i++){
        let txt = info[titleArr[i]] || "";

        html += `
              <tr>
                <td width="115" align="right" class="sl12c">${titleArr[i]}</td>
                <td width="15" class="sl14c">&nbsp;</td>
                <td width="189" align="left" class="black12">${txt}</td>
              </tr>
        `;
        // 1-8 显示虚线
        if(i <= 7){
            html += `
              <tr>
                <td align="right"></td>
                <td></td>
                <td align="left" class="xx"></td>
              </tr>
            `;
        }
    }
    html += "</table>";

    document.getElementById("htmlBox").innerHTML = html;
})
</script>
