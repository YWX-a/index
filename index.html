<script>
// =========【可修改的标题列表，和Excel表头同步即可】=========
let titleList = [
	"名称",
    "统一社会信用代码",
    "宗旨和业务范围",
    "住所",
    "法定代表人",
    "经费来源",
    "开办资金",
    "举办单位",
    "有效期",
    "单位状态"
];
// ========================================================

// 获取URL参数
let paramS = window.location.search.replace('?s=', '');

// 读取并解析Excel
fetch("data.xlsx")
.then(response => response.arrayBuffer())
.then(buffer => {
    const workbook = XLSX.read(buffer);
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const jsonData = XLSX.utils.sheet_to_json(sheet);

    // 清除表头空格，避免匹配失败
    const cleanedData = jsonData.map(row => {
        const newRow = {};
        for (let key in row) {
            newRow[key.trim()] = row[key];
        }
        return newRow;
    });

    // 匹配对应数据
    const targetRow = cleanedData.find(row => String(row.s) === String(paramS)) || {};

    // 拼接原版1:1格式的HTML
    let html = '<table width="92%" border="0" cellspacing="0" cellpadding="0">';
    titleList.forEach((title, index) => {
        const content = targetRow[title] || "";
        html += `
            <tr>
				<td width="115" align="right" valign="top" class="sl12c">${title}</td>
                <td width="10" class="sl14c">&nbsp;</td>
                <td width="189" align="left" class="black12">${content}</td>
            </tr>
        `;
        // 1-8 显示虚线，9-10不显示
        if (index <= 7) {
            html += `
                <tr>
                    <td align="right"></td>
                    <td></td>
                    <td align="left" class="xx"></td>
                </tr>
            `;
        }
    });
    html += '</table>';

    // 插入到页面，不破坏原有结构
    document.getElementById('dataContainer').innerHTML = html;
})
.catch(error => {
    console.error('加载失败:', error);
    document.getElementById('dataContainer').innerHTML = '<p style="color:red;">数据加载失败，请检查Excel文件</p >';
});
</script>
